min_version = "2026.6.10"

[tools]
prek = "0.3.9"
uv = "0.11.22"

[settings]
python.uv_venv_auto = "create|source"
task.output = "prefix"

[env]
_.python.venv = { path = ".venv" }

# Environment setup

[tasks.install-dependencies]
description = "Install the project dependencies"
run = "uv sync"

[tasks.install-git-hooks]
description = "Install and prepare the repository Git hooks"
run = "prek install --prepare-hooks"

# Application

[tasks.start-server]
description = "Run the API"
run = "uv run tooling-demo serve"

[tasks.start-dev-server]
description = "Run the API with automatic reloads"
run = "uv run tooling-demo serve --reload"

# Quality checks

[tasks.run-tests]
description = "Run the test suite"
run = "uv run pytest"

[tasks.pre-commit]
description = "Run all pre-commit checks against the repository"
run = "prek run --all-files"

[tasks.validate-pre-commit-config]
hide = true
run = "prek validate-config .pre-commit-config.yaml"

[tasks.validate-pre-commit]
hide = true
env = { SKIP = "no-commit-to-branch" }
run = "prek run --all-files"

# Diagnostics

[tasks.diagnose-mise]
hide = true
run = '''
echo "== mise =="
mise --version
mise ls --current
'''

[tasks.diagnose-prek]
hide = true
run = '''
echo "== prek =="
prek --version
prek list
'''

[tasks.diagnose-git-hooks]
hide = true
run = '''
echo "== Git hooks =="
for hook in pre-commit commit-msg; do
  hook_path="$(git rev-parse --git-path "hooks/$hook")"
  if [ ! -x "$hook_path" ]; then
    echo "$hook is not installed at $hook_path"
    exit 1
  fi
  echo "$hook: $hook_path"
done
'''

[tasks.diagnose-uv]
hide = true
run = '''
echo "== uv =="
uv --version
'''

[tasks.diagnose-python]
hide = true
run = '''
echo "== Python =="
python --version
python -c 'import sys; print(f"executable: {sys.executable}")'
uv run python --version
uv run python -c 'import sys; print(f"executable: {sys.executable}")'
'''

[tasks.diagnose-environment]
hide = true
run = '''
echo "== project environment =="
uv pip check
uv pip list
'''

[tasks.diagnose-application]
hide = true
run = '''
echo "== application =="
uv run tooling-demo info
'''

# Aggregate workflows

[tasks.setup]
description = "Install the development environment"
run = [
  { tasks = ["install-dependencies", "install-git-hooks"] },
  'echo "Development environment is ready."',
]

[tasks.validate-setup]
description = "Print diagnostics and validate the development setup"
run = [
  { tasks = [
    "diagnose-mise",
    "diagnose-prek",
    "diagnose-git-hooks",
    "diagnose-uv",
    "diagnose-python",
    "diagnose-environment",
    "diagnose-application",
    "validate-pre-commit-config",
    "validate-pre-commit",
    "run-tests",
  ] },
  'echo "Setup validation passed."',
]
